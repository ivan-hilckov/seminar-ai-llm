# SPA served by nginx. Client-side routing (React Router, BrowserRouter) means
# direct hits on /slide/12, /section/1, etc. must fall back to index.html —
# otherwise nginx 404s on refresh/deep-link.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets — safe to cache forever.
    location /assets/ {
        add_header Cache-Control "public, immutable, max-age=31536000";
        try_files $uri =404;
    }

    # Never cache the HTML shell — it points at the current asset hashes.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: unknown paths render the app, which routes client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
