<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>07 · Т9 на Nokia · Секция 1 · AI и LLM для исследователей</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="deck-stage.js"></script>
<style>
  :root{
    --bg:    #FAFAF7;
    --ink:   #1A1A1A;
    --mute:  #6B6B68;
    --rule:  #D9D7CF;
  }
  html, body{
    margin:0; padding:0;
    background:var(--bg); color:var(--ink);
    font-family:"IBM Plex Sans", system-ui, sans-serif;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  deck-stage{ background:#0a0a0a; }

  section{
    width:1920px; height:1080px;
    background:var(--bg); color:var(--ink);
    font-family:"IBM Plex Sans", system-ui, sans-serif;
    font-weight:400;
    position:relative;
    overflow:hidden;
    box-sizing:border-box;
  }

  /* ─── Meta plate (top-right) ─── */
  .meta{
    position:absolute; top:48px; right:96px;
    display:flex; align-items:center; gap:16px;
    font-family:"IBM Plex Mono", monospace;
  }
  .meta .num{
    font-size:20px;
    color:var(--mute);
    letter-spacing:.04em;
  }
  .meta .type{
    width:32px; height:24px;
    background:var(--rule);
    display:flex; align-items:center; justify-content:center;
    font-size:14px; color:var(--ink);
    letter-spacing:.02em;
  }

  /* ─── Footer ─── */
  .foot{
    position:absolute; right:96px; bottom:48px;
    font-family:"IBM Plex Mono", monospace;
    font-size:14px; color:var(--mute);
    letter-spacing:.06em; text-transform:uppercase;
  }

  /* ─── Visual zone (62% width) ─── */
  .visual{
    position:absolute;
    left:96px; top:140px;
    width:1094px; height:800px;
    display:flex; align-items:center; justify-content:center;
  }
  .visual svg{
    height:760px; width:auto;
    display:block;
  }

  /* ─── Right text block (38%, bottom-aligned) ─── */
  .right{
    position:absolute;
    left:1254px; right:96px; bottom:140px;
    display:flex; flex-direction:column;
  }
  .right .sub{
    font-family:"IBM Plex Mono", monospace;
    font-size:16px; color:var(--mute);
    letter-spacing:.08em; text-transform:uppercase;
    margin:0 0 32px 0;
  }
  .right .title{
    font-family:"IBM Plex Sans", sans-serif;
    font-weight:500;
    font-size:36px; line-height:1.18;
    letter-spacing:-.005em;
    color:var(--ink);
    margin:0 0 24px 0;
    text-wrap:pretty;
  }
  .right .cap{
    font-family:"IBM Plex Sans", sans-serif;
    font-weight:400;
    font-size:22px; line-height:1.4;
    color:var(--ink);
    text-wrap:pretty;
    margin:0;
    max-width:560px;
  }
</style>
</head>
<body>
<deck-stage>

<section data-screen-label="07 Т9 на Nokia">

  <!-- top-right meta plate -->
  <div class="meta">
    <span class="num">07</span>
    <span class="type">C</span>
  </div>

  <!-- left: phone illustration -->
  <div class="visual">
    <svg viewBox="0 0 400 820" xmlns="http://www.w3.org/2000/svg" aria-label="Кнопочный телефон с экраном Т9">
      <!-- Body -->
      <rect x="20" y="20" width="360" height="780" rx="46" ry="46"
            fill="none" stroke="#1A1A1A" stroke-width="2"/>

      <!-- Speaker slot -->
      <line x1="170" y1="54" x2="230" y2="54"
            stroke="#1A1A1A" stroke-width="4" stroke-linecap="round"/>

      <!-- Screen (dark fill) -->
      <rect x="60" y="90" width="280" height="240" rx="4" ry="4"
            fill="#1A1A1A"/>

      <!-- Screen content -->
      <g font-family="IBM Plex Mono, monospace" fill="#FAFAF7">
        <text x="74" y="114" font-size="11" letter-spacing="0.12em" opacity="0.7">T9 · RU</text>
        <text x="326" y="114" font-size="11" letter-spacing="0.12em" text-anchor="end" opacity="0.7">ABC</text>
        <line x1="74" y1="126" x2="326" y2="126"
              stroke="#FAFAF7" stroke-width="0.5" opacity="0.25"/>
      </g>

      <g font-family="IBM Plex Sans, sans-serif" fill="#FAFAF7">
        <text x="200" y="172" font-size="30" font-weight="500"
              text-anchor="middle" letter-spacing="0.01em">привет</text>
        <rect x="278" y="151" width="2" height="26" fill="#FAFAF7"/>
      </g>

      <!-- options list -->
      <g font-family="IBM Plex Sans, sans-serif" fill="#FAFAF7">
        <line x1="74" y1="194" x2="326" y2="194"
              stroke="#FAFAF7" stroke-width="0.5" opacity="0.25"/>
        <text x="86" y="220" font-size="16" opacity="0.55">прибор</text>
        <rect x="78" y="230" width="244" height="28" rx="2"
              fill="none" stroke="#FAFAF7" stroke-width="1"/>
        <text x="86" y="250" font-size="16" font-weight="500">привет</text>
        <text x="314" y="250" font-size="11"
              font-family="IBM Plex Mono, monospace"
              letter-spacing="0.1em" text-anchor="end" opacity="0.7">2/3</text>
        <text x="86" y="282" font-size="16" opacity="0.55">пример</text>
      </g>

      <!-- Soft-key marks -->
      <g stroke="#1A1A1A" stroke-width="1.2" fill="none">
        <line x1="86" y1="354" x2="120" y2="354"/>
        <line x1="280" y1="354" x2="314" y2="354"/>
      </g>

      <!-- Central nav / OK pill -->
      <rect x="160" y="368" width="80" height="34" rx="17"
            fill="none" stroke="#1A1A1A" stroke-width="1.5"/>
      <text x="200" y="390"
            font-family="IBM Plex Mono, monospace"
            font-size="11" letter-spacing="0.18em"
            text-anchor="middle" fill="#1A1A1A">OK</text>

      <!-- Keypad — 4×3 -->
      <g id="keypad"
         font-family="IBM Plex Sans, sans-serif"
         fill="#1A1A1A"
         stroke="#1A1A1A">

        <!-- Row 1 -->
        <rect x="66"  y="430" width="80" height="60" rx="10" fill="none" stroke-width="1.2"/>
        <text x="106" y="460" font-size="20" font-weight="500" text-anchor="middle" stroke="none">1</text>
        <text x="106" y="478" font-size="8.5"
              font-family="IBM Plex Mono, monospace"
              letter-spacing="0.12em" text-anchor="middle" stroke="none" fill="#6B6B68">.,?!</text>

        <rect x="160" y="430" width="80" height="60" rx="10" fill="none" stroke-width="1.2"/>
        <text x="200" y="460" font-size="20" font-weight="500" text-anchor="middle" stroke="none">2</text>
        <text x="200" y="478" font-size="9"
              font-family="IBM Plex Mono, monospace"
              letter-spacing="0.18em" text-anchor="middle" stroke="none" fill="#6B6B68">ABC</text>

        <rect x="254" y="430" width="80" height="60" rx="10" fill="none" stroke-width="1.2"/>
        <text x="294" y="460" font-size="20" font-weight="500" text-anchor="middle" stroke="none">3</text>
        <text x="294" y="478" font-size="9"
              font-family="IBM Plex Mono, monospace"
              letter-spacing="0.18em" text-anchor="middle" stroke="none" fill="#6B6B68">DEF</text>

        <!-- Row 2 -->
        <rect x="66"  y="510" width="80" height="60" rx="10" fill="none" stroke-width="1.2"/>
        <text x="106" y="540" font-size="20" font-weight="500" text-anchor="middle" stroke="none">4</text>
        <text x="106" y="558" font-size="9"
              font-family="IBM Plex Mono, monospace"
              letter-spacing="0.18em" text-anchor="middle" stroke="none" fill="#6B6B68">GHI</text>

        <rect x="160" y="510" width="80" height="60" rx="10" fill="none" stroke-width="1.2"/>
        <text x="200" y="540" font-size="20" font-weight="500" text-anchor="middle" stroke="none">5</text>
        <text x="200" y="558" font-size="9"
              font-family="IBM Plex Mono, monospace"
              letter-spacing="0.18em" text-anchor="middle" stroke="none" fill="#6B6B68">JKL</text>

        <rect x="254" y="510" width="80" height="60" rx="10" fill="none" stroke-width="1.2"/>
        <text x="294" y="540" font-size="20" font-weight="500" text-anchor="middle" stroke="none">6</text>
        <text x="294" y="558" font-size="9"
              font-family="IBM Plex Mono, monospace"
              letter-spacing="0.18em" text-anchor="middle" stroke="none" fill="#6B6B68">MNO</text>

        <!-- Row 3 -->
        <rect x="66"  y="590" width="80" height="60" rx="10" fill="none" stroke-width="1.2"/>
        <text x="106" y="620" font-size="20" font-weight="500" text-anchor="middle" stroke="none">7</text>
        <text x="106" y="638" font-size="9"
              font-family="IBM Plex Mono, monospace"
              letter-spacing="0.16em" text-anchor="middle" stroke="none" fill="#6B6B68">PQRS</text>

        <rect x="160" y="590" width="80" height="60" rx="10" fill="none" stroke-width="1.2"/>
        <text x="200" y="620" font-size="20" font-weight="500" text-anchor="middle" stroke="none">8</text>
        <text x="200" y="638" font-size="9"
              font-family="IBM Plex Mono, monospace"
              letter-spacing="0.18em" text-anchor="middle" stroke="none" fill="#6B6B68">TUV</text>

        <rect x="254" y="590" width="80" height="60" rx="10" fill="none" stroke-width="1.2"/>
        <text x="294" y="620" font-size="20" font-weight="500" text-anchor="middle" stroke="none">9</text>
        <text x="294" y="638" font-size="9"
              font-family="IBM Plex Mono, monospace"
              letter-spacing="0.16em" text-anchor="middle" stroke="none" fill="#6B6B68">WXYZ</text>

        <!-- Row 4 -->
        <rect x="66"  y="670" width="80" height="60" rx="10" fill="none" stroke-width="1.2"/>
        <text x="106" y="708" font-size="22" font-weight="500" text-anchor="middle" stroke="none">*</text>

        <rect x="160" y="670" width="80" height="60" rx="10" fill="none" stroke-width="1.2"/>
        <text x="200" y="704" font-size="20" font-weight="500" text-anchor="middle" stroke="none">0</text>
        <text x="200" y="722" font-size="9"
              font-family="IBM Plex Mono, monospace"
              letter-spacing="0.18em" text-anchor="middle" stroke="none" fill="#6B6B68">+</text>

        <rect x="254" y="670" width="80" height="60" rx="10" fill="none" stroke-width="1.2"/>
        <text x="294" y="706" font-size="20" font-weight="500" text-anchor="middle" stroke="none">#</text>
      </g>
    </svg>
  </div>

  <!-- right: text block, bottom-aligned with visual -->
  <div class="right">
    <div class="sub">1.1 Т9 на Nokia</div>
    <h2 class="title">С этого всё началось</h2>
    <p class="cap">Конец 1990-х — начало 2000-х. Был у каждого.</p>
  </div>

  <!-- footer -->
  <div class="foot">AI &amp; LLM · ФБУ ВНИИЛМ</div>

</section>

</deck-stage>

<script>
(async () => {
  try { await customElements.whenDefined('deck-stage'); } catch (e) {}
  // wait for deck-stage to inject its @page rule into <head>
  for (let i = 0; i < 40; i++) {
    if (document.getElementById('deck-stage-print-page')) break;
    await new Promise(r => setTimeout(r, 50));
  }
  try { await document.fonts.ready; } catch (e) {}
  setTimeout(() => { try { window.print(); } catch (e) {} }, 600);
})();
</script>
</body>
</html>
