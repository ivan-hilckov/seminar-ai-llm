<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>07 · Т9 на Nokia · Секция 1 · AI и LLM для исследователей</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:    #FAFAF7;
    --ink:   #1A1A1A;
    --mute:  #6B6B68;
    --rule:  #D9D7CF;
  }
  html, body{
    margin:0; padding:0; height:100%;
    background:#0a0a0a;
    font-family:"IBM Plex Sans", system-ui, sans-serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  .stage{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .slide{
    width:1920px; height:1080px;
    min-width:1920px; min-height:1080px;
    flex:0 0 auto;
    background:var(--bg);
    position:relative;
    overflow:hidden;
    transform-origin:center center;
    box-sizing:border-box;
  }

  /* ─── Meta plate (top-right) ─── */
  .meta{
    position:absolute; top:48px; right:96px;
    display:flex; align-items:center; gap:16px;
    font-family:"IBM Plex Mono", monospace;
  }
  .meta .num{
    font-size:20px;
    color:var(--mute);
    letter-spacing:.04em;
  }
  .meta .type{
    width:32px; height:24px;
    background:var(--rule);
    display:flex; align-items:center; justify-content:center;
    font-size:14px; color:var(--ink);
    letter-spacing:.02em;
  }

  /* ─── Footer ─── */
  .foot{
    position:absolute; right:96px; bottom:48px;
    font-family:"IBM Plex Mono", monospace;
    font-size:14px; color:var(--mute);
    letter-spacing:.06em; text-transform:uppercase;
  }

  /* ─── Visual zone (62% width, ~96..1190) ─── */
  .visual{
    position:absolute;
    left:96px; top:140px;
    width:1094px; height:800px;
    display:flex; align-items:center; justify-content:center;
  }
  .visual svg{
    height:760px; width:auto;
    display:block;
  }

  /* ─── Right text block (38% width, bottom-aligned with visual) ─── */
  .right{
    position:absolute;
    left:1254px; right:96px; bottom:140px;
    display:flex; flex-direction:column;
  }
  .right .sub{
    font-family:"IBM Plex Mono", monospace;
    font-size:16px; color:var(--mute);
    letter-spacing:.08em; text-transform:uppercase;
    margin:0 0 32px 0;
  }
  .right .title{
    font-family:"IBM Plex Sans", sans-serif;
    font-weight:500;
    font-size:36px; line-height:1.18;
    letter-spacing:-.005em;
    color:var(--ink);
    margin:0 0 24px 0;
    text-wrap:pretty;
  }
  .right .cap{
    font-family:"IBM Plex Sans", sans-serif;
    font-weight:400;
    font-size:22px; line-height:1.4;
    color:var(--ink);
    text-wrap:pretty;
    margin:0;
    max-width:560px;
  }

  /* ─── Print: A4 landscape, single page ─── */
  @page { size: A4 landscape; margin: 0; }
  @media print{
    html, body{ background:var(--bg) !important; }
    .stage{ position:static; display:block; background:var(--bg) !important; }
    .slide{
      transform: scale(0.5849) !important;   /* 1123 / 1920 = fits A4 landscape width */
      transform-origin: top left !important;
      box-shadow:none !important;
    }
  }
</style>
</head>
<body>

</div>

<script>
  // Proportional scaling: fit to viewport, cap rendered slide width at 1280px on screen.
  (function(){
    const slide = document.querySelector('.slide');
    function fit(){
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const targetW = Math.min(vw, 1280);
      const sx = targetW / 1920;
      const sy = vh / 1080;
      const s = Math.min(sx, sy);
      slide.style.transform = 'scale(' + s + ')';
    }
    window.addEventListener('resize', fit);
    window.addEventListener('load', fit);
    fit();
  })();
</script>
</body>
</html>
