<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Слайд XX · Визуал</title>
<link rel="stylesheet" href="../shared/styles.css">
<style>
  /* Специфика шаблона C */
  .slide-c__layout {
    position: absolute;
    top: 96px;
    left: 96px;
    right: 96px;
    bottom: 96px;
    display: flex;
    align-items: stretch;
    gap: 64px;
  }
  .slide-c__visual {
    flex: 0 0 62%;
    display: flex;
    align-items: center;
    justify-content: center;
    /* Визуал на off-white фоне, без рамки, без тени */
  }
  .slide-c__text {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    /* Текст выровнен по нижнему краю визуала */
  }
  .slide-c__meta {
    margin-bottom: 32px;
  }
  .slide-c__title {
    font-size: 36px;
    font-weight: 500;
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 24px;
  }
  .slide-c__caption {
    font-size: 22px;
    font-weight: 400;
    line-height: 1.4;
    color: var(--text);
  }
  
  /* Заглушка для визуала — удалить когда будет реальный контент */
  .visual-placeholder {
    width: 100%;
    height: 80%;
    border: 1px dashed var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
<div class="screen-wrapper">
  <div class="slide">
    
    <!-- Мета-плашка -->
    <div class="slide-meta">
      <span class="slide-number">XX</span>
      <span class="slide-type">C</span>
    </div>
    
    <!-- Двухколоночная композиция -->
    <div class="slide-c__layout">
      
      <!-- Визуал (62%) -->
      <div class="slide-c__visual">
        <!-- SVG / схема / скриншот сюда -->
        <div class="visual-placeholder">ВИЗУАЛ</div>
      </div>
      
      <!-- Текстовый блок (38%, по нижнему краю) -->
      <div class="slide-c__text">
        <div class="slide-c__meta meta-tag">
          1.X ПОДБЛОК
        </div>
        <h1 class="slide-c__title">
          Заголовок слайда
        </h1>
        <p class="slide-c__caption">
          Подпись к визуалу. Две-три-четыре строки текста, объясняющего что изображено и зачем.
        </p>
      </div>
      
    </div>
    
    <!-- Колонтитул -->
    <div class="slide-footer">AI &amp; LLM · ФБУ ВНИИЛМ</div>
    
  </div>
</div>
</body>
</html>
