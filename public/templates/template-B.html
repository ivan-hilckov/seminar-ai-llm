<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Слайд XX · Тезис</title>
<link rel="stylesheet" href="../shared/styles.css">
<style>
  /* Специфика шаблона B */
  .slide-b__meta {
    position: absolute;
    top: 96px;
    left: 96px;
  }
  .slide-b__content {
    position: absolute;
    top: 50%;
    left: 96px;
    right: 96px;
    transform: translateY(-50%);
  }
  .slide-b__thesis {
    font-size: 44px;
    font-weight: 500;
    line-height: 1.3;
    color: var(--text);
    max-width: 1400px;
  }
  .slide-b__anchor {
    margin-top: 32px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px;
    color: var(--text-secondary);
  }
</style>
</head>
<body>
<div class="screen-wrapper">
  <div class="slide">
    
    <!-- Мета-плашка -->
    <div class="slide-meta">
      <span class="slide-number">XX</span>
      <span class="slide-type">B</span>
    </div>
    
    <!-- Мета-тег подблока -->
    <div class="slide-b__meta meta-tag">
      1.X ПОДБЛОК
    </div>
    
    <!-- Тезис -->
    <div class="slide-b__content">
      <p class="slide-b__thesis">
        Здесь главный тезис слайда в одну или две строки
      </p>
      <p class="slide-b__anchor">
        → опциональный якорь к следующему слайду
      </p>
    </div>
    
    <!-- Колонтитул -->
    <div class="slide-footer">AI &amp; LLM · ФБУ ВНИИЛМ</div>
    
  </div>
</div>
</body>
</html>
